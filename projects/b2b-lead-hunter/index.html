<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B 精准线索挖掘系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2d3148;--primary:#6366f1;--primary-hover:#818cf8;--text:#e2e8f0;--text-dim:#94a3b8;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:1400px;margin:0 auto}
header{text-align:center;padding:40px 0 30px}
header h1{font-size:2.2rem;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:var(--text-dim);font-size:1rem}
.search-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:30px;margin-bottom:24px}
.search-panel h2{font-size:1.1rem;margin-bottom:16px;color:var(--primary-hover)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px}
.form-group label{display:block;font-size:0.85rem;color:var(--text-dim);margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
.btn{padding:12px 28px;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{opacity:0.9}
.btn-warning{background:var(--warning);color:#000}
.btn-sm{padding:6px 14px;font-size:0.8rem}
.actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.status{margin-left:auto;font-size:0.85rem;color:var(--text-dim)}
.results-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:30px;margin-bottom:24px}
.results-panel h2{font-size:1.1rem;margin-bottom:16px;color:var(--success)}
.lead-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;transition:border-color .2s}
.lead-card:hover{border-color:var(--primary)}
.lead-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.lead-header h3{font-size:1.05rem;color:var(--text)}
.lead-header .badge{background:var(--primary);color:#fff;padding:3px 10px;border-radius:20px;font-size:0.75rem}
.lead-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.lead-details .item{font-size:0.85rem}
.lead-details .item .label{color:var(--text-dim)}
.lead-details .item .value{color:var(--text);font-weight:500}
.pain-points{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:12px}
.pain-points h4{font-size:0.85rem;color:var(--warning);margin-bottom:6px}
.pain-points p{font-size:0.85rem;color:var(--text-dim);line-height:1.5}
.email-template{background:var(--bg);border-radius:8px;padding:12px}
.email-template h4{font-size:0.85rem;color:var(--primary-hover);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.email-template pre{font-size:0.8rem;color:var(--text-dim);white-space:pre-wrap;line-height:1.6;font-family:inherit}
.email-template .copy-btn{font-size:0.7rem;padding:2px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer}
.email-template .copy-btn:hover{border-color:var(--primary);color:var(--primary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:3rem;margin-bottom:16px}
.empty-state p{font-size:1rem}
.loading{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-bar{width:100%;height:4px;background:var(--surface2);border-radius:2px;margin-top:12px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));transition:width .3s;border-radius:2px}
.stats{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.stat-item{background:var(--surface2);padding:12px 20px;border-radius:8px;text-align:center}
.stat-item .num{font-size:1.5rem;font-weight:700;color:var(--primary-hover)}
.stat-item .lbl{font-size:0.75rem;color:var(--text-dim);margin-top:2px}
footer{text-align:center;padding:30px 0;color:var(--text-dim);font-size:0.8rem}
@media(max-width:768px){header h1{font-size:1.6rem}.form-grid{grid-template-columns:1fr}.actions{flex-direction:column;align-items:stretch}.status{margin-left:0;margin-top:8px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🎯 B2B 精准线索挖掘系统</h1>
<p>输入目标行业 → 智能搜索 → 结构化线索 → 冷邮件生成 → 一键导出</p>
</header>

<div class="search-panel">
<h2>🔍 搜索条件</h2>
<div class="form-grid">
<div class="form-group">
<label>目标行业</label>
<input type="text" id="industry" placeholder="如：SaaS、制造业、教育科技" value="SaaS">
</div>
<div class="form-group">
<label>目标地区</label>
<input type="text" id="region" placeholder="如：北京、上海、深圳" value="深圳">
</div>
<div class="form-group">
<label>公司规模</label>
<select id="companySize">
<option value="startup">初创 (1-50人)</option>
<option value="small">小型 (50-200人)</option>
<option value="medium" selected>中型 (200-1000人)</option>
<option value="large">大型 (1000+人)</option>
</select>
</div>
<div class="form-group">
<label>搜索关键词补充</label>
<input type="text" id="keywords" placeholder="可选：CTO、融资、招聘等">
</div>
</div>
<div class="actions">
<button class="btn btn-primary" id="searchBtn">开始挖掘线索</button>
<button class="btn btn-success" id="exportBtn" style="display:none">📥 导出 CSV</button>
<button class="btn btn-warning btn-sm" id="clearBtn" style="display:none">清空结果</button>
<span class="status" id="statusText"></span>
</div>
<div class="progress-bar" id="progressBar" style="display:none"><div class="fill" id="progressFill"></div></div>
</div>

<div class="results-panel" id="resultsPanel" style="display:none">
<div class="stats" id="statsArea"></div>
<h2>📋 挖掘结果</h2>
<div id="resultsContainer"></div>
</div>

<div class="results-panel" id="emptyPanel">
<div class="empty-state">
<div class="icon">🔎</div>
<p>设置搜索条件，点击「开始挖掘线索」<br>系统将通过搜索引擎自动发现目标企业信息</p>
</div>
</div>

<footer>
<p>B2B 精准线索挖掘系统 · 纯前端实现 · DuckDuckGo 搜索 · 零后端依赖</p>
</footer>
</div>

<script>
const PROXY = 'https://api.allorigins.win/raw?url=';
let leads = [];

function $(id) { return document.getElementById(id); }

function setStatus(text, loading) {
  $('statusText').innerHTML = (loading ? '<span class="loading"></span>' : '') + text;
}

function setProgress(pct) {
  $('progressBar').style.display = 'block';
  $('progressFill').style.width = pct + '%';
}

async function searchDDG(query) {
  const url = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
  const proxyUrl = PROXY + encodeURIComponent(url);
  const resp = await fetch(proxyUrl);
  if (!resp.ok) throw new Error('Search request failed: ' + resp.status);
  const html = await resp.text();
  return parseDDGResults(html);
}

function parseDDGResults(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const results = [];
  const items = doc.querySelectorAll('.result, .web-result');
  items.forEach(item => {
    const titleEl = item.querySelector('.result__title a, .result__a');
    const snippetEl = item.querySelector('.result__snippet');
    const urlEl = item.querySelector('.result__url, .result__extras__url');
    if (titleEl) {
      results.push({
        title: titleEl.textContent.trim(),
        snippet: snippetEl ? snippetEl.textContent.trim() : '',
        url: urlEl ? urlEl.textContent.trim() : (titleEl.href || '')
      });
    }
  });
  return results;
}

function extractCompanyInfo(result, industry, region, size) {
  const title = result.title;
  const snippet = result.snippet;
  const url = result.url;
  
  let companyName = title.replace(/[-_|·—].*$/, '').replace(/官网|首页|公司|有限|科技$/g, '').trim();
  if (companyName.length > 20) companyName = companyName.substring(0, 20);
  if (companyName.length < 2) companyName = title.substring(0, 15);
  
  let website = url.replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
  
  let contactInfo = '见官网';
  const emailMatch = snippet.match(/[\w.-]+@[\w.-]+\.\w+/);
  const phoneMatch = snippet.match(/1[3-9]\d{9}|0\d{2,3}-?\d{7,8}/);
  if (emailMatch) contactInfo = emailMatch[0];
  else if (phoneMatch) contactInfo = phoneMatch[0];
  
  const roles = ['CEO', 'CTO', 'COO', 'VP', 'CMO', '创始人', '总经理', '总监'];
  let decisionMaker = '待深挖';
  for (const role of roles) {
    if (snippet.includes(role)) { decisionMaker = `${role}（需LinkedIn确认）`; break; }
  }
  
  const painPoints = generatePainPoints(industry, size, snippet);
  
  return {
    companyName,
    website: website || '未知',
    contact: contactInfo,
    decisionMaker,
    painPoints,
    industry,
    region,
    size,
    source: url,
    rawSnippet: snippet
  };
}

function generatePainPoints(industry, size, snippet) {
  const painMap = {
    'SaaS': ['获客成本高，需要精准营销方案', '用户留存率待提升，需数据驱动运营', '竞争激烈，需差异化产品定位'],
    '制造业': ['数字化转型需求迫切', '供应链管理效率待优化', '人工成本上升，需自动化方案'],
    '教育': ['线上获客渠道单一', '课程交付标准化困难', '学员续费率需提升'],
    '医疗': ['合规成本高', '患者管理数字化需求', '数据安全要求严格'],
    '金融': ['风控模型需迭代', '获客成本高', '用户体验需优化'],
  };
  
  let pains = [];
  for (const [key, values] of Object.entries(painMap)) {
    if (industry.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(industry.toLowerCase())) {
      pains = values;
      break;
    }
  }
  if (pains.length === 0) {
    pains = ['业务增长瓶颈，需新渠道拓展', '运营效率有提升空间', '数字化程度待加强'];
  }
  
  const sizeMap = {
    'startup': '资源有限，需高性价比方案',
    'small': '快速扩张期，流程标准化需求',
    'medium': '管理复杂度上升，需系统化工具',
    'large': '部门协作效率待优化'
  };
  pains.push(sizeMap[size] || '');
  
  return pains.filter(p => p).slice(0, 3);
}

function generateColdEmail(lead) {
  const sizeLabel = {'startup':'初创','small':'小型','medium':'中型','large':'大型'}[lead.size] || '';
  return `主题：关于${lead.companyName}的${lead.painPoints[0]?.split('，')[0] || '业务增长'}

Hi ${lead.decisionMaker !== '待深挖' ? lead.decisionMaker : '负责人'},

我注意到${lead.companyName}在${lead.industry}领域发展很快，作为${sizeLabel}企业，
想必您也在关注：${lead.painPoints[0] || '业务效率提升'}。

我们帮助过多家同行业公司解决类似问题，平均提升了30%+的效率。

能否约15分钟快速沟通？我可以分享一些针对性的方案思路。

Best regards`;
}

function renderLeads() {
  if (leads.length === 0) {
    $('resultsPanel').style.display = 'none';
    $('emptyPanel').style.display = 'block';
    $('exportBtn').style.display = 'none';
    $('clearBtn').style.display = 'none';
    return;
  }
  
  $('emptyPanel').style.display = 'none';
  $('resultsPanel').style.display = 'block';
  $('exportBtn').style.display = 'inline-block';
  $('clearBtn').style.display = 'inline-block';
  
  $('statsArea').innerHTML = `
    <div class="stat-item"><div class="num">${leads.length}</div><div class="lbl">线索总数</div></div>
    <div class="stat-item"><div class="num">${leads.filter(l=>l.contact!=='见官网').length}</div><div class="lbl">有联系方式</div></div>
    <div class="stat-item"><div class="num">${leads.filter(l=>l.decisionMaker!=='待深挖').length}</div><div class="lbl">决策人线索</div></div>
    <div class="stat-item"><div class="num">${leads.length}</div><div class="lbl">邮件模板</div></div>
  `;
  
  let html = '';
  leads.forEach((lead, idx) => {
    const email = generateColdEmail(lead);
    html += `
    <div class="lead-card">
      <div class="lead-header">
        <h3>${lead.companyName}</h3>
        <span class="badge">#${idx + 1}</span>
      </div>
      <div class="lead-details">
        <div class="item"><span class="label">官网：</span><span class="value">${lead.website}</span></div>
        <div class="item"><span class="label">联系方式：</span><span class="value">${lead.contact}</span></div>
        <div class="item"><span class="label">决策人：</span><span class="value">${lead.decisionMaker}</span></div>
        <div class="item"><span class="label">行业/地区：</span><span class="value">${lead.industry} · ${lead.region}</span></div>
      </div>
      <div class="pain-points">
        <h4>💡 痛点分析</h4>
        <p>${lead.painPoints.join('；')}</p>
      </div>
      <div class="email-template">
        <h4>✉️ 冷邮件模板 <button class="copy-btn" data-idx="${idx}">复制</button></h4>
        <pre>${email}</pre>
      </div>
    </div>`;
  });
  $('resultsContainer').innerHTML = html;
  
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const i = parseInt(this.dataset.idx);
      const text = generateColdEmail(leads[i]);
      navigator.clipboard.writeText(text).then(() => { this.textContent = '已复制 ✓'; setTimeout(() => this.textContent = '复制', 1500); });
    });
  });
}

async function startSearch() {
  const industry = $('industry').value.trim();
  const region = $('region').value.trim();
  const size = $('companySize').value;
  const extra = $('keywords').value.trim();
  
  if (!industry) { alert('请输入目标行业'); return; }
  
  $('searchBtn').disabled = true;
  leads = [];
  setStatus('正在构建搜索策略...', true);
  setProgress(5);
  
  const sizeLabel = {'startup':'初创公司','small':'小型企业','medium':'中型企业','large':'大型企业'}[size];
  const queries = [
    `${region} ${industry} ${sizeLabel} 公司 官网`,
    `${region} ${industry} 企业 联系方式 ${extra}`.trim(),
    `${industry} ${sizeLabel} ${region} CEO CTO 创始人`,
    `${region} ${industry} 公司 招聘 融资`
  ];
  
  let allResults = [];
  
  for (let i = 0; i < queries.length; i++) {
    setStatus(`搜索中 (${i+1}/${queries.length}): ${queries[i].substring(0, 30)}...`, true);
    setProgress(10 + (i / queries.length) * 60);
    try {
      const results = await searchDDG(queries[i]);
      allResults = allResults.concat(results);
      await new Promise(r => setTimeout(r, 1500));
    } catch(e) {
      console.warn('Search failed for query:', queries[i], e);
    }
  }
  
  setStatus('正在提取企业信息...', true);
  setProgress(75);
  
  const seen = new Set();
  allResults.forEach(r => {
    const info = extractCompanyInfo(r, industry, region, size);
    const key = info.companyName + info.website;
    if (!seen.has(key) && info.companyName.length >= 2) {
      seen.add(key);
      leads.push(info);
    }
  });
  
  setProgress(90);
  setStatus('正在生成冷邮件模板...', true);
  await new Promise(r => setTimeout(r, 500));
  
  setProgress(100);
  setStatus(`✅ 完成！发现 ${leads.length} 条线索`, false);
  $('searchBtn').disabled = false;
  setTimeout(() => { $('progressBar').style.display = 'none'; }, 1000);
  
  renderLeads();
}

function exportCSV() {
  if (leads.length === 0) return;
  const headers = ['公司名称', '官网', '联系方式', '决策人', '行业', '地区', '痛点分析', '冷邮件模板'];
  const rows = leads.map(l => [
    l.companyName,
    l.website,
    l.contact,
    l.decisionMaker,
    l.industry,
    l.region,
    l.painPoints.join('；'),
    generateColdEmail(l).replace(/\n/g, '\\n')
  ]);
  
  let csv = '\uFEFF' + headers.join(',') + '\n';
  rows.forEach(row => {
    csv += row.map(cell => `"${(cell||'').replace(/"/g, '""')}"`).join(',') + '\n';
  });
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `B2B_leads_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
}

$('searchBtn').addEventListener('click', startSearch);
$('exportBtn').addEventListener('click', exportCSV);
$('clearBtn').addEventListener('click', () => { leads = []; renderLeads(); setStatus('', false); });
</script>
</body>
</html>
