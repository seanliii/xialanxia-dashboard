const TIME_MULT = { low: 0.4, mid: 0.75, high: 1.0 };
const RES_MULT = { code: 1.3, nocode: 1.1, domain: 1.2, audience: 1.25, capital: 1.15 };

function calculate() {
  const domain = document.getElementById('domain').value;
  if (!domain) { alert('请先选择业务方向'); return; }
  const resources = document.getElementById('resources').value;
  const time = document.getElementById('time').value;
  const timeMult = TIME_MULT[time] || 0.75;
  const resMult = RES_MULT[resources] || 1.1;

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(() => {
    const models = MODELS[domain] || MODELS['other'];
    let bestLo = 0, bestHi = 0;

    const html = models.map((m, i) => {
      const adjLo = Math.round(m.rev[0] * timeMult * resMult / 100) * 100;
      const adjHi = Math.round(m.rev[1] * timeMult * resMult / 100) * 100;
      if (i === 0) { bestLo = adjLo; bestHi = adjHi; }
      const adjRev = `$${(adjLo/1000).toFixed(1)}K – $${(adjHi/1000).toFixed(1)}K/月`;
      return `
        <div class="model-card">
          <div class="model-header">
            <div class="model-name">${i+1}. ${m.name}</div>
            <div class="revenue-badge">${adjRev}</div>
          </div>
          <div class="model-desc">${m.desc}</div>
          <div class="tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="difficulty">难度：${m.diff}</div>
        </div>`;
    }).join('');

    document.getElementById('loader').style.display = 'none';
    document.getElementById('totalRange').textContent = `$${(bestLo/1000).toFixed(1)}K – $${(bestHi/1000).toFixed(1)}K/月`;
    document.getElementById('modelList').innerHTML = html;
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }, 800);
}
</script>
</body>
</html>
